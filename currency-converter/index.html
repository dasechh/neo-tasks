<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Currency converter</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main>
      <section class="exchange">
        <article class="exchange__wrapper">
          <h1 class="exchange__title">Exchange rate in internet bank</h1>
          <h2 class="exchange__subtitle">Currency</h2>
          <ul class="exchange__list" id="exchange__list"></ul>
        </article>
        <figure class="exchange__figure">
          <img src="./bank.svg" alt="Exchange" class="exchange__image" />
        </figure>
        <a href="#" class="exchange__link">All courses</a>
      </section>
    </main>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="./main.js" type="module" defer></script>
  </body>
</html>
