<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="styles.css" />
    <title>Tooltip</title>
  </head>
  <body>
    <main>
      <div class="tooltip">
        <span class="tooltip-text" aria-describedby="tooltip-bubble" tabindex="0">
          Наведите для подсказки</span
        >
        <span class="tooltip-bubble" role="tooltip" id="tooltip-bubble">Ваша подсказка здесь</span>
      </div>
    </main>
  </body>
</html>
